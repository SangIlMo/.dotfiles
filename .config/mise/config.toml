# [env]

[settings]
experimental = true
idiomatic_version_file_enable_tools = []

[tasks.claude-bypass]
description = "Run Claude Code with bypass permissions"
run = "claude --dangerously-skip-permissions"

[tasks.specs-status]
description = "Show EARS specs status for current project"
run = """
PROJECT=$(basename "$PWD")
SPECS_DIR="$HOME/.claude/specs/$PROJECT"
echo "=== Specs Status: $PROJECT ==="
for status in pending doing done; do
  count=$(ls "$SPECS_DIR/$status" 2>/dev/null | wc -l | tr -d ' ')
  echo "$status: $count"
  ls "$SPECS_DIR/$status" 2>/dev/null | sed 's/^/  /'
done
"""

[tasks."tmux:ls"]
description = "List tmux sessions"
run = "tmux list-sessions 2>/dev/null || echo 'No tmux server running.'"

[tasks."tmux:attach"]
description = "Attach to tmux session (usage: mise run tmux:attach SESSION_NAME)"
run = "tmux attach-session -t \"$1\""

[tasks."tmux:new"]
description = "Create new tmux session (usage: mise run tmux:new SESSION_NAME)"
run = """
NAME="${1:?Session name required}"
tmux new-session -d -s "$NAME" -c "$PWD" && echo "Session '$NAME' created." && tmux attach-session -t "$NAME"
"""

[tasks."tmux:rename"]
description = "Rename current tmux session (usage: mise run tmux:rename NEW_NAME)"
run = """
NEW="${1:?New name required}"
tmux rename-session "$NEW" && echo "Session renamed to '$NEW'."
"""

[tasks."tmux:kill"]
description = "Kill a tmux session (usage: mise run tmux:kill SESSION_NAME)"
run = """
NAME="${1:?Session name required}"
tmux kill-session -t "$NAME" && echo "Session '$NAME' killed."
"""

[tasks."tmux:windows"]
description = "List windows in current tmux session"
run = "tmux list-windows -F '#I: #{window_name} #{window_active} (#{pane_current_command})'"

[tools]
ripgrep = "latest"
node = "latest"
fzf = "latest"
watchexec = "latest"
bat = "latest"
just = "latest"
pnpm = "latest"
stylua = "latest"
shfmt = "latest"
python = "latest"
dust = "latest"
"npm:@openai/codex" = "latest"
jq = "latest"
java = "25"
maven = "3.9"
"npm:dmux" = "latest"
